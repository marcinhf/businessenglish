<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Business English — Polish–English interpretation">
  <!-- PL / EN diptych: porcelain + graphite halves split by a straight divider,
       each half carrying a dot of the opposite colour. Steel frame keeps both
       halves legible on any tab background. -->
  <defs>
    <clipPath id="frame"><rect x="3" y="3" width="58" height="58" rx="11"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="32" height="64" fill="#f3f4f2"/>
    <rect x="32" width="32" height="64" fill="#15181c"/>
    <circle cx="16" cy="32" r="7" fill="#15181c"/>
    <circle cx="48" cy="32" r="7" fill="#f3f4f2"/>
  </g>
  <rect x="3" y="3" width="58" height="58" rx="11" fill="none" stroke="#7c8896" stroke-width="3.5"/>
</svg>
