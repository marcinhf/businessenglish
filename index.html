<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tłumaczenia symultaniczne polsko-angielskie · Polish–English simultaneous interpretation</title>
<meta name="description" content="Tłumaczenia symultaniczne i konferencyjne w parze językowej polski–angielski oraz angielski–polski. Professional simultaneous interpretation between Polish and English, in both directions (PL→EN, EN→PL). B2B, faktura VAT.">
<meta property="og:title" content="Tłumaczenia symultaniczne polsko-angielskie · Polish–English simultaneous interpretation">
<meta property="og:description" content="Tłumaczenia symultaniczne polski–angielski i angielski–polski. Simultaneous interpretation between Polish and English, both directions. B2B VAT invoice.">
<meta property="og:type" content="website">
<meta property="og:locale" content="pl_PL">
<meta property="og:locale:alternate" content="en_US">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Tłumaczenia symultaniczne polsko-angielskie",
  "alternateName": "Polish–English Simultaneous Interpretation",
  "description": "Tłumaczenia symultaniczne w parze polski–angielski i angielsko-polski (PL→EN, EN→PL) dla konferencji i wydarzeń biznesowych. Simultaneous interpretation between Polish and English, both directions, for conferences and business events. B2B invoicing (faktura VAT).",
  "knowsLanguage": ["pl", "en"],
  "url": "https://businessenglish.pl"
}
</script>
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); }

  .page {
    position: relative;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(420px, 100%), 1fr));
    gap: 1px;
    background: var(--hairline-on-light);
    min-height: 100svh;
    animation: fade-in 900ms var(--ease) both;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .page { animation: none; } }

  .panel {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-4);
    padding: clamp(28px, 8cqi, 96px);
    box-sizing: border-box;
    text-align: center;
    container-type: inline-size;
    min-height: 100svh;
  }
  .panel--pl {
    background: var(--surface-light);
    color: var(--text-on-light);
  }
  .panel--en {
    background: var(--surface-dark);
    color: var(--text-on-dark);
  }

  .lang-tag {
    position: absolute;
    top: var(--space-4);
    font-size: var(--label-size-sm);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .panel--pl .lang-tag { color: var(--text-on-light-muted); }
  .panel--en .lang-tag { color: var(--text-on-dark-muted); }

  h1 {
    font-family: var(--font-display);
    font-weight: var(--display-weight);
    font-size: clamp(17px, 6.4cqi, 52px);
    line-height: 1.1;
    letter-spacing: var(--display-tracking);
    margin: 0;
    white-space: nowrap;
  }

  .head-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .contact {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    align-items: center;
    font-size: var(--body-size);
    font-weight: var(--body-weight);
    letter-spacing: var(--body-tracking);
    white-space: nowrap;
  }

  .direction {
    font-size: clamp(10px, 1.7cqi, 12px);
    font-weight: var(--label-weight);
    letter-spacing: 0.25em;
    text-indent: 0.25em;
    text-transform: uppercase;
    margin: 0;
    line-height: 1.9;
  }
  .panel--pl .direction { color: var(--text-on-light-muted); }
  .panel--en .direction { color: var(--text-on-dark-muted); }

  .rule { width: var(--accent-rule-w); height: var(--rule-w); }
  .panel--pl .rule { background: var(--brass); }
  .panel--en .rule { background: var(--brass-bright); }

  a {
    color: inherit;
    text-decoration: none;
    padding-bottom: 3px;
    background-repeat: no-repeat;
    background-position: left bottom;
    background-size: 0% 1px;
    transition: color var(--duration) var(--ease), background-size var(--duration) var(--ease);
  }
  .panel--pl a:hover { color: var(--link-hover); background-image: linear-gradient(var(--link-hover), var(--link-hover)); background-size: 100% 1px; }
  .panel--en a:hover { color: var(--link-hover-on-dark); background-image: linear-gradient(var(--link-hover-on-dark), var(--link-hover-on-dark)); background-size: 100% 1px; }
  a:active { opacity: 0.7; }
  .note {
    font-size: var(--label-size);
    font-weight: var(--label-weight);
    letter-spacing: var(--label-tracking);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .panel--pl .note { color: var(--text-on-light-muted); }
  .panel--en .note { color: var(--text-on-dark-muted); }
</style>
</head>
<body>
  <main class="page">
    <section class="panel panel--pl" lang="pl" data-screen-label="PL panel">
      <span class="lang-tag">PL</span>
      <div class="head-group">
        <h1>Tłumaczenia symultaniczne</h1>
        <p class="direction">polsko-angielskie &middot; angielsko-polskie</p>
      </div>
      <span class="rule"></span>
      <div class="contact">
        <a data-c="phone" href="#">&nbsp;</a>
        <a data-c="email" href="#">&nbsp;</a>
      </div>
      <p class="note">Faktura VAT (B2B)</p>
    </section>
    <section class="panel panel--en" lang="en" data-screen-label="EN panel">
      <span class="lang-tag">EN</span>
      <div class="head-group">
        <h1>Simultaneous interpretation</h1>
        <p class="direction">Polish&#8211;English &middot; English&#8211;Polish</p>
      </div>
      <span class="rule"></span>
      <div class="contact">
        <a data-c="phone" href="#">&nbsp;</a>
        <a data-c="email" href="#">&nbsp;</a>
      </div>
      <p class="note">B2B VAT invoice</p>
    </section>
  </main>
  <script>
    // Contact details are stored XOR-encoded (key 42) so the page source
    // contains no readable email address or phone number; they are decoded
    // and wired to the tel:/mailto: links only at runtime, in the browser.
    (function () {
      var K = 42;
      function d(a) { return a.map(function (n) { return String.fromCharCode(n ^ K); }).join(""); }
      var email = d([79, 71, 75, 67, 70, 106, 72, 95, 89, 67, 68, 79, 89, 89, 79, 68, 77, 70, 67, 89, 66, 4, 90, 70]);
      var tel   = d([1, 30, 18, 31, 26, 27, 31, 27, 18, 25, 18, 25]);
      var phone = d([1, 30, 18, 10, 31, 26, 27, 10, 31, 27, 10, 18, 25, 10, 18, 25]);
      document.querySelectorAll('[data-c="phone"]').forEach(function (a) {
        a.href = "tel:" + tel;
        a.textContent = phone;
      });
      document.querySelectorAll('[data-c="email"]').forEach(function (a) {
        a.href = "mail" + "to:" + email;
        a.textContent = email;
      });
    })();
  </script>
</body>
</html>
